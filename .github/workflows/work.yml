name: CI

on:
  push:
    branches: ["work"]
  pull_request:
    branches: ["work"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Prevent BLAS/OpenMP-related segfaults in numpy/scipy/sklearn
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1

      # Prevent hosted Python shared-lib leakage into NumPy
      LD_LIBRARY_PATH: ""

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install project (clean + deterministic)
        run: |
          python -m pip install --no-cache-dir --force-reinstall ".[test]"

      - name: Run tests
        run: |
          python -m pytest -q